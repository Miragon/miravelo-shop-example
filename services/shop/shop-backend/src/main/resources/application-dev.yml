server:
  port: 8081

# Tokens are issued under the nginx /auth prefix (see stack/docker-compose.yml).
ISSUER_URI: http://localhost:8080/auth/realms/miravelo

DATABASE_URL: jdbc:postgresql://localhost:5432/test
DATABASE_USER: test
DATABASE_PASSWORD: test
DATABASE_DRIVER_CLASS_NAME: org.postgresql.Driver
DATABASE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
DATABASE_SAMPLE_DATA_ENABLED: true

CORS_ALLOWED_ORIGINS: "http://localhost:8080,http://localhost:5173"
SWAGGER_API_ENABLED: true
