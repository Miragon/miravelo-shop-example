server:
  port: ${PORT:8080}

shop:
  backend:
    url: ${SHOP_BACKEND_URL:http://localhost:8081}

logging:
  pattern:
    console: "%nopex"
  level:
    root: OFF

spring:
  main:
    banner-mode: off
  ai:
    mcp:
      server:
        enabled: true
        name: miravelo-shop
        stdio: true
        instructions: "Miravelo is a bike shop offering gravel bikes, road bikes and cycling gear one can search for and order"
