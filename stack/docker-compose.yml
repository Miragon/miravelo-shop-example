# Two supported setups, same file:
#   - local single-origin: `docker compose --profile solo up` → nginx on :8080
#     fronts everything (/ → vite:5173, /api/ → backend:8081, /auth/ → keycloak).
#     Defaults below target this mode. Keycloak admin is on :8088.
#   - portless parallel-dev: `dev.sh up` (no profile, so nginx stays off)
#     overrides every ${VAR} with branch-specific, hash-derived values.
name: miravelo-${BRANCH_SLUG:-local}

services:
  postgres:
    image: postgres:18
    container_name: miravelo-${BRANCH_SLUG:-local}-postgres
    environment:
      POSTGRES_DB: test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      PGUSER: test
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    container_name: miravelo-${BRANCH_SLUG:-local}-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-http://localhost:8080/auth}
      KC_HTTP_RELATIVE_PATH: ${KC_RELATIVE_PATH:-/auth}
      KC_HTTP_MANAGEMENT_RELATIVE_PATH: /
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/healthcheck.sh:/healthcheck.sh:ro
    ports:
      - "${KEYCLOAK_PORT:-8088}:8080"
    healthcheck:
      test: ["CMD", "bash", "/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  keycloak-config-cli:
    image: adorsys/keycloak-config-cli:latest-26
    container_name: miravelo-${BRANCH_SLUG:-local}-keycloak-config-cli
    environment:
      KEYCLOAK_URL: http://keycloak:8080${KC_RELATIVE_PATH:-/auth}
      KEYCLOAK_USER: admin
      KEYCLOAK_PASSWORD: admin
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: 120s
      IMPORT_FILES_LOCATION: /config/
      IMPORT_VARSUBSTITUTION_ENABLED: "true"
      KC_REDIRECT_URIS: '["${APP_ORIGIN:-http://localhost:8080}/*"]'
      KC_WEB_ORIGINS: '["${APP_ORIGIN:-http://localhost:8080}"]'
      KC_TEST_USER_PASSWORD: test
    volumes:
      - ./keycloak/miravelo-realm.yaml:/config/miravelo-realm.yaml:ro
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"

  # Single entry point for local dev — only started with `--profile solo`, 
  # so it never runs in the portless setup. 
  # Proxies the frontend (vite) and backend running on the host, plus keycloak in-compose.
  nginx:
    image: nginx:alpine
    container_name: miravelo-${BRANCH_SLUG:-local}-nginx
    profiles: ["solo"]
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      keycloak:
        condition: service_healthy
    restart: unless-stopped
