replicaCount: 1

image:
  repository: shop-frontend
  pullPolicy: IfNotPresent
  tag: "local"

service:
  port: 8080

ingress:
  enabled: false
  annotations: {}
  hosts:
    - host: shop-frontend.local
      paths:
        - path: /
          pathType: Prefix

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

env:
  # Browser-facing Keycloak settings, served at runtime via app.env.
  KEYCLOAK_URL: ""
  KEYCLOAK_REALM: ""
  KEYCLOAK_CLIENT_ID: ""
